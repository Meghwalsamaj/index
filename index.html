<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>मेघवाल समाज दसौरिया, गरोठ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --income: #1b8a4a; --income-bg: #eafaf1;
      --expense: #c0392b; --expense-bg: #fdf0ef;
      --accent: #1a56db; --card: #ffffff;
      --border: #e0e7ef; --text: #1a2340;
      --subtext: #6b7a99; --bg: #f4f6fb;
      --shadow: 0 2px 16px rgba(30,60,120,0.08);
      --header-bg: #1a56db; --wa: #25d366;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); min-height: 100vh; font-family: 'Poppins', sans-serif; color: var(--text); }

    #appLoader { position:fixed; inset:0; background:var(--header-bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
    #appLoader h2 { color:#fff; font-family:'Tiro Devanagari Hindi',serif; font-size:1.3rem; }
    #appLoader p  { color:#c5d5f7; font-size:0.82rem; }
    .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,35,64,0.55); z-index:999; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:#fff; border-radius:18px; border:1.5px solid var(--border); box-shadow:0 8px 40px rgba(30,60,120,0.18); padding:26px 22px 20px; width:100%; max-width:360px; text-align:center; animation:popIn 0.3s ease; }
    @keyframes popIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
    .modal-box h2 { font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:5px; }
    .modal-box p  { font-size:0.78rem; color:var(--subtext); margin-bottom:14px; }
    .modal-btns { display:flex; gap:10px; margin-top:4px; }
    .btn-cancel  { flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:#f4f6fb; color:var(--subtext); font-size:0.88rem; font-weight:600; cursor:pointer; }
    .btn-cancel:hover { border-color:var(--expense); color:var(--expense); }
    .btn-primary { flex:1; padding:10px; border-radius:10px; border:none; background:var(--accent); color:white; font-size:0.88rem; font-weight:700; cursor:pointer; }
    .btn-primary:hover { opacity:0.88; }
    .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

    #pinInput { width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid var(--border); background:#f4f6fb; color:var(--text); font-size:1.4rem; letter-spacing:10px; text-align:center; font-family:'Poppins',sans-serif; outline:none; transition:border 0.2s; margin-bottom:8px; }
    #pinInput:focus { border-color:var(--accent); }
    #pinInput:disabled { opacity:0.5; cursor:not-allowed; }
    #pinError { font-size:0.78rem; min-height:20px; margin-bottom:8px; color:var(--expense); }
    #lockMsg  { font-size:0.8rem; color:var(--expense); font-weight:600; margin-bottom:8px; min-height:20px; }

    #waModal .modal-box { max-width:380px; text-align:left; }
    #waModal h2, #waModal p { text-align:center; }
    .wa-rasid-box { background:#f0fdf5; border:1px solid #a7f3c0; border-radius:10px; padding:12px 14px; font-size:0.82rem; color:#166534; line-height:1.7; margin-bottom:14px; font-family:monospace; white-space:pre-wrap; max-height:280px; overflow-y:auto; }
    .btn-wa { width:100%; padding:11px; border:none; border-radius:10px; font-size:0.95rem; font-weight:700; cursor:pointer; background:var(--wa); color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; }
    .btn-wa:hover { opacity:0.88; }
    .btn-wa-cancel { width:100%; padding:9px; border:1.5px solid var(--border); border-radius:10px; background:#f4f6fb; color:var(--subtext); font-size:0.85rem; font-weight:600; cursor:pointer; }
    .btn-wa-cancel:hover { border-color:var(--expense); color:var(--expense); }

    #adminCornerTab { position:fixed; bottom:18px; right:18px; z-index:900; }
    .corner-btn { background:#fff; border:1.5px solid var(--accent); color:var(--accent); padding:8px 16px; border-radius:22px; font-size:0.78rem; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(26,86,219,0.15); transition:0.2s; display:flex; align-items:center; gap:6px; }
    .corner-btn:hover { background:var(--accent); color:#fff; }
    .corner-btn.admin-active { background:var(--income-bg); border-color:var(--income); color:var(--income); }
    .corner-btn.admin-active:hover { background:var(--income); color:#fff; }

    header { background:var(--header-bg); padding:18px 20px 14px; text-align:center; position:relative; box-shadow:0 2px 12px rgba(26,86,219,0.15); }
    header h1 { font-family:'Tiro Devanagari Hindi',serif; font-size:1.4rem; font-weight:700; color:#fff; }
    header p  { font-size:0.78rem; color:#c5d5f7; margin-top:3px; }
    .mode-badge { position:absolute; top:14px; right:14px; font-size:0.65rem; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:0.8px; }
    .mode-badge.admin  { background:#fff; color:var(--accent); }
    .mode-badge.viewer { background:#e8f4f0; color:var(--income); }



    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:12px 14px 0; max-width:720px; margin:0 auto; }
    .sum-card { background:var(--card); border-radius:14px; padding:12px 8px; text-align:center; border:1.5px solid var(--border); box-shadow:var(--shadow); }
    .sum-card .label { font-size:0.65rem; color:var(--subtext); font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .sum-card .amount { font-size:1.1rem; font-weight:700; margin-top:4px; }
    .sum-card.income .amount  { color:var(--income); }
    .sum-card.expense .amount { color:var(--expense); }
    .sum-card.balance .amount { color:var(--accent); }



    .main-tabs { max-width:720px; margin:12px auto 0; padding:0 14px; display:flex; border-radius:14px 14px 0 0; overflow:hidden; border:1.5px solid var(--border); border-bottom:none; }
    .main-tab { flex:1; padding:11px 10px; text-align:center; font-size:0.9rem; font-weight:700; cursor:pointer; transition:0.2s; background:#f0f4ff; color:var(--subtext); border:none; outline:none; }
    .main-tab.active-income  { background:var(--income-bg); color:var(--income);  border-bottom:3px solid var(--income); }
    .main-tab.active-expense { background:var(--expense-bg); color:var(--expense); border-bottom:3px solid var(--expense); }

    .tab-content { max-width:720px; margin:0 auto; padding:0 14px; display:none; }
    .tab-content.active { display:block; }

    .form-card { background:var(--card); border-radius:0 0 14px 14px; padding:16px 14px; border:1.5px solid var(--border); border-top:none; box-shadow:var(--shadow); margin-bottom:12px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .form-row.full { grid-template-columns:1fr; }
    label { font-size:0.75rem; font-weight:600; color:var(--subtext); display:block; margin-bottom:4px; }
    input { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:0.87rem; font-family:'Poppins',sans-serif; background:#f8faff; color:var(--text); outline:none; transition:border 0.2s; }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:#b0b8cc; }
    .btn-add { width:100%; padding:11px; border:none; border-radius:10px; font-size:0.9rem; font-weight:700; cursor:pointer; margin-top:10px; transition:0.2s; }
    .btn-add.income-btn  { background:var(--income); color:#fff; }
    .btn-add.expense-btn { background:var(--expense); color:#fff; }
    .btn-add:hover { opacity:0.88; }
    .btn-add:disabled { opacity:0.5; cursor:not-allowed; }

    .search-bar { margin-bottom:10px; }
    .search-bar input { background:#fff; }

    .tx-list { display:flex; flex-direction:column; gap:8px; }
    .tx-item { background:var(--card); border-radius:12px; padding:10px 12px; border:1.5px solid var(--border); display:flex; align-items:center; gap:10px; box-shadow:var(--shadow); animation:fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .tx-serial { font-size:0.68rem; font-weight:700; color:var(--subtext); flex-shrink:0; min-width:22px; text-align:center; }
    .tx-icon { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.95rem; flex-shrink:0; }
    .tx-icon.income  { background:var(--income-bg); }
    .tx-icon.expense { background:var(--expense-bg); }
    .tx-info { flex:1; min-width:0; }
    .tx-desc { font-size:0.85rem; font-weight:600; color:var(--text); white-space:normal; word-break:break-word; }
    .tx-meta { font-size:0.7rem; color:var(--subtext); margin-top:2px; }
    .tx-amount { font-size:0.95rem; font-weight:700; flex-shrink:0; }
    .tx-amount.income  { color:var(--income); }
    .tx-amount.expense { color:var(--expense); }
    .tx-actions { display:flex; gap:4px; flex-shrink:0; }
    .tx-wa     { background:none; border:none; font-size:1rem; cursor:pointer; color:#b0b8cc; padding:4px; transition:0.2s; }
    .tx-wa:hover { color:var(--wa); }
    .tx-delete { background:none; border:none; font-size:0.95rem; cursor:pointer; color:#b0b8cc; padding:4px; }
    .tx-delete:hover { color:var(--expense); }
    .empty { text-align:center; color:var(--subtext); padding:28px 0; font-size:0.9rem; }

    .pagination { display:flex; justify-content:center; align-items:center; gap:6px; margin:14px 0 80px; flex-wrap:wrap; }
    .pg-btn { padding:6px 12px; border-radius:8px; border:1.5px solid var(--border); background:#fff; color:var(--subtext); font-size:0.82rem; font-weight:600; cursor:pointer; transition:0.2s; min-width:36px; }
    .pg-btn:hover { border-color:var(--accent); color:var(--accent); }
    .pg-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .pg-btn:disabled { opacity:0.35; cursor:not-allowed; }
    .pg-info { font-size:0.75rem; color:var(--subtext); padding:0 4px; }

    .report-bar { max-width:720px; margin:0 auto 20px; padding:0 14px; }
    .report-bar button { width:auto; display:block; margin:0 auto; padding:8px 28px; border:none; border-radius:10px; font-size:0.82rem; font-weight:700; cursor:pointer; background:#374151; color:white; }
    .report-bar button:hover { opacity:0.88; }

    @media(max-width:480px){
      .summary{gap:8px;padding:10px 12px 0}
      .sum-card .amount{font-size:1rem}
      .form-row{grid-template-columns:1fr}
      header h1{font-size:1.15rem}
    }
  </style>
</head>
<body>

<div id="appLoader">
  <div class="spinner"></div>
  <h2>मेघवाल समाज दसौरिया, गरोठ</h2>
  <p>डेटा लोड हो रहा है...</p>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <h2>🔐 Admin Login</h2>
    <p>Admin PIN दर्ज करें</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="• • • • • •" onkeydown="if(event.key==='Enter') doAdminLogin()"/>
    <div id="pinError"></div>
    <div id="lockMsg"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdminModal()">रद्द करें</button>
      <button class="btn-primary" id="pinLoginBtn" onclick="doAdminLogin()">Login करें</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="waModal">
  <div class="modal-box">
    <h2>📲 WhatsApp रसीद</h2>
    <p>Preview — भेजें दबाकर contact चुनें</p>
    <div class="wa-rasid-box" id="waPreview"></div>
    <button class="btn-wa" onclick="sendWA()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp पर भेजें
    </button>
    <button class="btn-wa-cancel" onclick="closeWAModal()">रद्द करें</button>
  </div>
</div>

<header>
  <h1>मेघवाल समाज दसौरिया, गरोठ</h1>
  <p>समाज कार्यक्रम फण्ड मैनेजर</p>
  <div class="mode-badge viewer" id="modeBadge">👁️ VIEWER</div>
</header>



<div class="summary">
  <div class="sum-card income"><div class="label">कुल आय</div><div class="amount" id="totalIncome">₹0</div></div>
  <div class="sum-card expense"><div class="label">कुल व्यय</div><div class="amount" id="totalExpense">₹0</div></div>
  <div class="sum-card balance"><div class="label">शेष राशि</div><div class="amount" id="balance">₹0</div></div>
</div>



<div class="main-tabs">
  <button class="main-tab active-income"  id="tab-income"  onclick="switchTab('income')">✅ आय <span id="inc-count"></span></button>
  <button class="main-tab"               id="tab-expense" onclick="switchTab('expense')">❌ व्यय <span id="exp-count"></span></button>
</div>

<div class="tab-content active" id="content-income">
  <div class="form-card" id="incFormCard" style="display:none">
    <div class="form-row">
      <div><label>तारीख</label><input type="date" id="inc-date"/></div>
      <div><label>राशि (₹)</label><input type="number" id="inc-amount" placeholder="जैसे: 5000" min="1" max="10000000"/></div>
    </div>
    <div class="form-row full">
      <div><label>विवरण</label><input type="text" id="inc-desc" placeholder="जैसे: वार्षिक उत्सव दान" maxlength="200"/></div>
    </div>
    <button class="btn-add income-btn" id="incAddBtn" onclick="addEntry('income')">✅ आय जोड़ें</button>
  </div>
  <div class="search-bar"><input type="text" id="inc-search" placeholder="🔍 खोजें..." oninput="resetPage('income'); renderList('income')"/></div>
  <div class="tx-list" id="inc-list"></div>
  <div class="pagination" id="inc-pagination"></div>
</div>

<div class="tab-content" id="content-expense">
  <div class="form-card" id="expFormCard" style="display:none">
    <div class="form-row">
      <div><label>तारीख</label><input type="date" id="exp-date"/></div>
      <div><label>राशि (₹)</label><input type="number" id="exp-amount" placeholder="जैसे: 2000" min="1" max="10000000"/></div>
    </div>
    <div class="form-row full">
      <div><label>विवरण</label><input type="text" id="exp-desc" placeholder="जैसे: पूजा सामग्री खरीद" maxlength="200"/></div>
    </div>
    <button class="btn-add expense-btn" id="expAddBtn" onclick="addEntry('expense')">❌ व्यय जोड़ें</button>
  </div>
  <div class="search-bar"><input type="text" id="exp-search" placeholder="🔍 खोजें..." oninput="resetPage('expense'); renderList('expense')"/></div>
  <div class="tx-list" id="exp-list"></div>
  <div class="pagination" id="exp-pagination"></div>
</div>

<div class="report-bar"><button onclick="printReport()">🖨️ Print Report</button></div>

<div id="adminCornerTab">
  <button class="corner-btn" id="cornerBtn" onclick="cornerBtnClick()">
    🔐 <span id="cornerLabel">Admin Login</span>
  </button>
</div>

<script>
  // ===== CONFIG =====
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwl4PoboEXoKrHPHFOr6PgY5G3ho3h3tePrC2Dwj1L8Rci3Tctu1Kf5RWS1CeiBSWg0Jg/exec';
  const SECRET_TOKEN = 'mgw_secret_2026'; // Same as Apps Script
  const PAGE_SIZE = 50;
  const MAX_ATTEMPTS = 5;

  let currentMode = 'viewer';
  let sessionToken = null; // Token mila server se login ke baad
  let entries = [];
  let pendingWAEntry = null;
  let pages = { income:1, expense:1 };
  let isSaving = false;
  let lockTimer = null;

  // ===== XSS PROTECTION =====
  function esc(str) {
    return String(str).replace(/[&<>"']/g, m => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    })[m]);
  }



  // ===== LOAD FROM SHEET =====
  async function loadFromSheet() {
    try {
      
      const res = await fetch(`${SHEET_URL}?token=${SECRET_TOKEN}`);
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      entries = data.map(r=>({
        id: String(r.id),
        type: r.type,
        date: r.date,
        amount: Number(r.amount),
        desc: String(r.desc),
        ts: Number(r.ts)||0
      })).filter(r=>r.id && r.type && r.date && r.amount);
      entries.sort((a,b)=>{
        const ta = Number(a.ts)||0, tb = Number(b.ts)||0;
        if(ta && tb) return tb - ta;
        if(ta && !tb) return -1;
        if(!ta && tb) return 1;
        // fallback: date descending, then id descending
        if(b.date !== a.date) return b.date.localeCompare(a.date);
        return String(b.id).localeCompare(String(a.id));
      });
      
      localStorage.setItem('samajFundBackup', JSON.stringify(entries));
    } catch(e) {
      
      entries = JSON.parse(localStorage.getItem('samajFundBackup')||'[]');
    }
    updateSummary();
    renderList('income');
    renderList('expense');
    document.getElementById('appLoader').style.display='none';
  }

  // ===== SAVE TO SHEET =====
  async function saveToSheet(action, payload) {
    try {
      
      const res = await fetch(SHEET_URL, {
        method:'POST',
        body: JSON.stringify({ action, token: SECRET_TOKEN, ...payload })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      
      localStorage.setItem('samajFundBackup', JSON.stringify(entries));
    } catch(e) {
      
    }
  }

  // ===== INIT =====
  (async()=>{
    await fetch(SHEET_URL, {
      method:'POST',
      body: JSON.stringify({action:'init', token: SECRET_TOKEN})
    }).catch(()=>{});
    await loadFromSheet();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('inc-date').value = today;
    document.getElementById('exp-date').value = today;
  })();

  // ===== ADMIN LOGIN — PIN verified SERVER SIDE =====
  function cornerBtnClick() {
    if(currentMode==='admin'){ if(confirm('Admin logout karna chahte hain?')) logout(); }
    else openAdminModal();
  }
  function openAdminModal() {
    document.getElementById('adminModal').classList.add('show');
    document.getElementById('pinInput').value='';
    document.getElementById('pinError').textContent='';
    document.getElementById('lockMsg').textContent='';
    document.getElementById('pinInput').disabled=false;
    document.getElementById('pinLoginBtn').disabled=false;
    setTimeout(()=> document.getElementById('pinInput').focus(), 100);
  }
  function closeAdminModal() {
    document.getElementById('adminModal').classList.remove('show');
    if(lockTimer){ clearTimeout(lockTimer); lockTimer=null; }
  }
  document.getElementById('adminModal').addEventListener('click',function(e){ if(e.target===this) closeAdminModal(); });

  async function doAdminLogin() {
    const pin = document.getElementById('pinInput').value;
    if(!pin) return;
    document.getElementById('pinLoginBtn').disabled = true;
    document.getElementById('pinError').textContent = '';

    try {
      const res = await fetch(SHEET_URL, {
        method:'POST',
        body: JSON.stringify({ action:'login', pin })
      });
      const data = await res.json();

      if(data.status === 'ok') {
        sessionToken = data.token;
        closeAdminModal();
        enterAdmin();
      } else if(data.status === 'locked') {
        startLockCountdown(data.lockedUntil);
      } else if(data.status === 'wrong') {
        document.getElementById('pinLoginBtn').disabled = false;
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
        if(data.remaining > 0) {
          document.getElementById('pinError').textContent = `❌ गलत PIN! ${data.remaining} कोशिश बाकी`;
        } else {
          startLockCountdown(data.lockedUntil);
        }
      }
    } catch(e) {
      document.getElementById('pinLoginBtn').disabled = false;
      document.getElementById('pinError').textContent = '⚠️ Server से connect नहीं हो पाया';
    }
  }

  function startLockCountdown(lockedUntil) {
    document.getElementById('pinInput').disabled = true;
    document.getElementById('pinLoginBtn').disabled = true;
    document.getElementById('pinError').textContent = '';
    function tick() {
      const remaining = Math.ceil((lockedUntil - Date.now()) / 1000);
      if(remaining <= 0) {
        document.getElementById('lockMsg').textContent = '';
        document.getElementById('pinInput').disabled = false;
        document.getElementById('pinLoginBtn').disabled = false;
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
        return;
      }
      const m = Math.floor(remaining/60), s = remaining%60;
      document.getElementById('lockMsg').textContent = `🔒 ${MAX_ATTEMPTS} बार गलत — ${m}:${String(s).padStart(2,'0')} बाद try करें`;
      lockTimer = setTimeout(tick, 1000);
    }
    tick();
  }

  function enterAdmin() {
    currentMode='admin';
    document.getElementById('modeBadge').textContent='🔐 ADMIN';
    document.getElementById('modeBadge').className='mode-badge admin';
    
    document.getElementById('incFormCard').style.display='block';
    document.getElementById('expFormCard').style.display='block';
    document.getElementById('cornerBtn').classList.add('admin-active');
    document.getElementById('cornerLabel').textContent='Logout';
    renderList('income'); renderList('expense');
  }

  function logout() {
    currentMode='viewer'; sessionToken=null;
    document.getElementById('modeBadge').textContent='👁️ VIEWER';
    document.getElementById('modeBadge').className='mode-badge viewer';
    
    document.getElementById('incFormCard').style.display='none';
    document.getElementById('expFormCard').style.display='none';
    document.getElementById('cornerBtn').classList.remove('admin-active');
    document.getElementById('cornerLabel').textContent='Admin Login';
    renderList('income'); renderList('expense');
  }

  // ===== UTILS =====
  function fmt(n){ return '₹'+Number(n).toLocaleString('hi-IN'); }
  function fmtDate(d){
    if(!d) return d;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [y,m,day]=d.split('-');
    return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
  }
  function resetPage(type){ pages[type]=1; }
  function switchTab(type){
    document.getElementById('content-income').classList.toggle('active',type==='income');
    document.getElementById('content-expense').classList.toggle('active',type==='expense');
    document.getElementById('tab-income').className ='main-tab'+(type==='income' ?' active-income':'');
    document.getElementById('tab-expense').className='main-tab'+(type==='expense'?' active-expense':'');
  }

  // ===== ADD ENTRY =====
  async function addEntry(type) {
    if(currentMode!=='admin'||isSaving) return;
    const p = type==='income'?'inc':'exp';
    const date   = document.getElementById(`${p}-date`).value;
    const amount = parseFloat(document.getElementById(`${p}-amount`).value);
    const desc   = document.getElementById(`${p}-desc`).value.trim();

    // Client-side validation
    if(!date||!amount||amount<=0||!desc){ alert('कृपया तारीख, राशि और विवरण भरें।'); return; }
    if(amount > 10000000){ alert('राशि बहुत बड़ी है।'); return; }
    if(desc.length > 200){ alert('विवरण 200 अक्षर से कम होना चाहिए।'); return; }

    isSaving=true;
    document.getElementById(`${p}AddBtn`).disabled=true;

    // Safe UUID
    const id = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : String(Date.now()) + Math.random().toString(36).slice(2);

    const ts = Date.now();
    const entry = { id, type, date, amount, desc, ts };
    entries.unshift(entry);
    updateSummary(); renderList(type);
    document.getElementById(`${p}-amount`).value='';
    document.getElementById(`${p}-desc`).value='';

    await saveToSheet('add', { entry });
    isSaving=false;
    document.getElementById(`${p}AddBtn`).disabled=false;
    if(type==='income') openWAModal(entry);
  }

  // ===== DELETE ENTRY =====
  async function deleteEntry(id) {
    if(currentMode!=='admin') return;
    if(!confirm('क्या आप यह एंट्री हटाना चाहते हैं?')) return;
    const e = entries.find(x=>x.id===id);
    entries = entries.filter(x=>x.id!==id);
    updateSummary();
    if(e) renderList(e.type);
    await saveToSheet('delete', { id });
  }

  // ===== SUMMARY =====
  function updateSummary(){
    const inc=entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const exp=entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    document.getElementById('totalIncome').textContent=fmt(inc);
    document.getElementById('totalExpense').textContent=fmt(exp);
    const bal=inc-exp;
    const el=document.getElementById('balance');
    el.textContent=fmt(bal); el.style.color=bal>=0?'#1a56db':'#c0392b';
    const ia=entries.filter(e=>e.type==='income');
    const ea=entries.filter(e=>e.type==='expense');
    document.getElementById('inc-count').textContent=ia.length?`(${ia.length})`:'';
    document.getElementById('exp-count').textContent=ea.length?`(${ea.length})`:'';
  }

  // ===== RENDER LIST =====
  function renderList(type){
    const listEl=document.getElementById(type==='income'?'inc-list':'exp-list');
    const pgEl  =document.getElementById(type==='income'?'inc-pagination':'exp-pagination');
    const q     =(document.getElementById(type==='income'?'inc-search':'exp-search').value||'').toLowerCase();
    const allOfType=entries.filter(e=>e.type===type);
    let filtered=allOfType;
    if(q) filtered=filtered.filter(e=>e.desc.toLowerCase().includes(q)||e.date.includes(q)||String(e.amount).includes(q));

    if(!filtered.length){
      listEl.innerHTML=`<div class="empty">कोई ${type==='income'?'आय':'व्यय'} एंट्री नहीं 🙏</div>`;
      pgEl.innerHTML=''; return;
    }

    const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
    if(pages[type]>totalPages) pages[type]=totalPages;
    const start=(pages[type]-1)*PAGE_SIZE;
    const pageData=filtered.slice(start,start+PAGE_SIZE);

    listEl.innerHTML=pageData.map(e=>{
      const serial=allOfType.length-allOfType.findIndex(x=>x.id===e.id);
      const entryJson=esc(JSON.stringify(e));
      return `
      <div class="tx-item">
        <div class="tx-serial">#${serial}</div>
        <div class="tx-icon ${e.type}">${e.type==='income'?'⬆️':'⬇️'}</div>
        <div class="tx-info">
          <div class="tx-desc">${esc(e.desc)}</div>
          <div class="tx-meta">${esc(fmtDate(e.date))}</div>
        </div>
        <div class="tx-amount ${e.type}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
        <div class="tx-actions">
          ${currentMode==='admin' && e.type==='income' ? `<button class="tx-wa" title="WhatsApp रसीद" onclick='openWAModal(JSON.parse(this.dataset.e))' data-e='${entryJson}'>📲</button>` : ''}
          ${currentMode==='admin'?`<button class="tx-delete" onclick="deleteEntry('${esc(e.id)}')">🗑️</button>`:''}
        </div>
      </div>`;
    }).join('');

    if(totalPages<=1){ pgEl.innerHTML=''; return; }
    let pgHTML=`<button class="pg-btn" onclick="goPage('${type}',${pages[type]-1})" ${pages[type]===1?'disabled':''}>‹</button>`;
    for(let i=1;i<=totalPages;i++){
      if(totalPages<=7||i===1||i===totalPages||Math.abs(i-pages[type])<=1)
        pgHTML+=`<button class="pg-btn${i===pages[type]?' active':''}" onclick="goPage('${type}',${i})">${i}</button>`;
      else if(Math.abs(i-pages[type])===2)
        pgHTML+=`<span class="pg-info">…</span>`;
    }
    pgHTML+=`<button class="pg-btn" onclick="goPage('${type}',${pages[type]+1})" ${pages[type]===totalPages?'disabled':''}>›</button>`;
    pgHTML+=`<span class="pg-info">${filtered.length} entries</span>`;
    pgEl.innerHTML=pgHTML;
  }

  function goPage(type,p){
    pages[type]=p; renderList(type);
    document.getElementById(`content-${type}`).scrollIntoView({behavior:'smooth',block:'start'});
  }

  // ===== WHATSAPP =====

    const allIncome=entries.filter(e=>e.type==='income');
    const serial=allIncome.length-allIncome.findIndex(x=>x.id===entry.id);
    const rasid=
`🙏 *मेघवाल समाज दसौरिया, गरोठ*
─────────────────────
✅ *आय रसीद #${serial}*
─────────────────────
📅 तारीख  : ${fmtDate(entry.date)}
💰 राशि   : *${fmt(entry.amount)}*
─────────────────────
📝 ${entry.desc}
─────────────────────
🔗 *हिसाब देखें:*
https://meghwalsamaj.github.io/index/
─────────────────────
🙏 *धन्यवाद*
_मेघवाल समाज दसौरिया, गरोठ_`;
    document.getElementById('waPreview').textContent=rasid;
    document.getElementById('waModal').classList.add('show');
  }
  function closeWAModal(){ document.getElementById('waModal').classList.remove('show'); pendingWAEntry=null; }
  document.getElementById('waModal').addEventListener('click',function(e){ if(e.target===this) closeWAModal(); });

  function sendWA(){
    const entry=pendingWAEntry;
    const allIncome=entries.filter(e=>e.type==='income');
    const serial=allIncome.length-allIncome.findIndex(x=>x.id===entry.id);
    const msg=
`🙏 *मेघवाल समाज दसौरिया, गरोठ*
─────────────────────
✅ *आय रसीद #${serial}*
─────────────────────
📅 तारीख  : ${fmtDate(entry.date)}
💰 राशि   : *${fmt(entry.amount)}*
─────────────────────
📝 ${entry.desc}
─────────────────────
🔗 *हिसाब देखें:*
https://meghwalsamaj.github.io/index/
─────────────────────
🙏 *धन्यवाद*
_मेघवाल समाज दसौरिया, गरोठ_`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
    closeWAModal();
  }

  // ===== PRINT =====
  function printReport(){
    const inc=entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const exp=entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const incList=entries.filter(e=>e.type==='income');
    const expList=entries.filter(e=>e.type==='expense');
    const row=(e,i,type,total)=>`<tr><td>${total-i}</td><td>${fmtDate(e.date)}</td><td>${esc(e.desc)}</td>
      <td style="color:${type==='income'?'#1b8a4a':'#c0392b'};font-weight:700">${type==='income'?'+':'-'}₹${e.amount.toLocaleString('hi-IN')}</td></tr>`;
    const incRows=incList.map((e,i)=>row(e,i,'income',incList.length)).join('')||'<tr><td colspan="4" style="text-align:center;color:#999">कोई आय नहीं</td></tr>';
    const expRows=expList.map((e,i)=>row(e,i,'expense',expList.length)).join('')||'<tr><td colspan="4" style="text-align:center;color:#999">कोई व्यय नहीं</td></tr>';
    const win=window.open('','_blank');
    win.document.write(`<html><head><title>मेघवाल समाज दसौरिया, गरोठ</title>
    <style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{color:#1a56db;text-align:center;margin-bottom:4px}h2{color:#1a56db;margin:18px 0 6px}.sum{display:flex;gap:16px;justify-content:center;margin:12px 0}.s{padding:10px 20px;border-radius:8px;font-weight:700;text-align:center}table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#1a56db;color:white;padding:8px;text-align:left;font-size:.85rem}td{padding:7px 8px;border-bottom:1px solid #eee;font-size:.83rem}tr:nth-child(even){background:#f8faff}.footer{text-align:center;margin-top:20px;font-size:.75rem;color:#999}</style></head><body>
    <h1>🙏 मेघवाल समाज दसौरिया, गरोठ</h1>
    <div class="sum">
      <div class="s" style="background:#eafaf1;color:#1b8a4a">कुल आय: ₹${inc.toLocaleString('hi-IN')}</div>
      <div class="s" style="background:#fdf0ef;color:#c0392b">कुल व्यय: ₹${exp.toLocaleString('hi-IN')}</div>
      <div class="s" style="background:#eaf0ff;color:#1a56db">शेष राशि: ₹${(inc-exp).toLocaleString('hi-IN')}</div>
    </div>
    <h2>✅ आय विवरण</h2>
    <table><tr><th>#</th><th>तारीख</th><th>विवरण</th><th>राशि</th></tr>${incRows}</table>
    <h2>❌ व्यय विवरण</h2>
    <table><tr><th>#</th><th>तारीख</th><th>विवरण</th><th>राशि</th></tr>${expRows}</table>
    <div class="footer">रिपोर्ट तारीख: ${new Date().toLocaleDateString('hi-IN')} | मेघवाल समाज दसौरिया, गरोठ</div>
    </body></html>`);
    win.document.close(); win.print();
  }
</script>
